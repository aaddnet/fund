services:
  db:
    image: postgres:16
    container_name: invest_local_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fund_system}
      POSTGRES_USER: ${POSTGRES_USER:-fund_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fund_pass}
      TZ: UTC
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fund_user} -d ${POSTGRES_DB:-fund_system}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - invest_pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-fund_user}:${POSTGRES_PASSWORD:-fund_pass}@db:5432/${POSTGRES_DB:-fund_system}
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      AUTH_MODE: ${AUTH_MODE:-hybrid}
      AUTH_ALLOW_DEV_FALLBACK: ${AUTH_ALLOW_DEV_FALLBACK:-true}
      # IMPORTANT: override AUTH_SECRET_KEY with a strong random value in production.
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:-change-me-invest-dev-secret}
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-false}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API: http://127.0.0.1:8000
      INTERNAL_API_BASE: http://backend:8000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  invest_pgdata:
