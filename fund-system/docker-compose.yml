version: "3"

services:

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: fund
      POSTGRES_PASSWORD: fund
      POSTGRES_DB: fund
    ports:
      - 5432:5432
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build: ./backend
    ports:
      - 8000:8000
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - 3000:3000
